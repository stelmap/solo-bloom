    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is it hard to start using Solo Bizz?",
            "acceptedAnswer": { "@type": "Answer", "text": "No. You can sign up and add your first client in under a minute. No setup, no training required." }
          },
          {
            "@type": "Question",
            "name": "Will it work if I work alone?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes. Solo Bizz is built specifically for solo practitioners — psychologists, therapists, coaches and tutors." }
          },
          {
            "@type": "Question",
            "name": "Can I run group sessions or supervisions?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes. You can manage individual sessions, group sessions and supervisions in one place." }
          },
          {
            "@type": "Question",
            "name": "Can I use it for teaching or tutoring?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes. Tutors and teachers use Solo Bizz to track lessons, payments and student progress." }
          },
          {
            "@type": "Question",
            "name": "Is there free access or a demo?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes. You can try Solo Bizz for free — no credit card required." }
          },
          {
            "@type": "Question",
            "name": "Do I need a credit card to try it?",
            "acceptedAnswer": { "@type": "Answer", "text": "No credit card is needed to start your free trial." }
          }
        ]
      }
